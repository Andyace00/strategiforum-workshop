services:
  - type: web
    name: strategiforum-workshop
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python workshop_server.py"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: "gemini-2.5-flash"
